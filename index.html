<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>استعلام الأصناف</title>
    <!-- iOS Web App Meta Tags -->
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="نظام الأصناف">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-top">
                <h1> كشف اسعار معرض ابو رامز للأجهزة الكهربائية </h1>
                <a href="invoice.html" class="btn btn-primary">إنشاء فاتورة</a>
            </div>
            <p>انتبه جدا للمعلومات التي بداخل هذا الموقع لانه يملك معلومات  حساسة</p>
        </header>
        
        <div class="controls-container">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="ابحث برقم الصنف، أو الاسم، أو السعر...">
                <div class="search-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </div>
            </div>
        </div>

        <div class="table-container">
            <table id="productsTable">
                <thead>
                    <tr>
                        <th data-sort="number" class="sortable">رقم الصنف <span class="sort-icon" id="sortNumberIcon">↕</span></th>
                        <th>اسم الصنف</th>
                        <th data-sort="price" class="sortable">السعر <span class="sort-icon" id="sortPriceIcon">↕</span></th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Products will be injected here via JS -->
                </tbody>
            </table>
        </div>
        <div id="noResults" class="no-results hidden">
            لا توجد نتائج مطابقة لبحثك.
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
